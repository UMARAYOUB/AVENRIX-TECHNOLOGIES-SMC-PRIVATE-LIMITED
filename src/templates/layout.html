<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{META_TITLE}} | AVENRIX TECHNOLOGIES</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="{{META_DESCRIPTION}}">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://avenrix.com/{{CANONICAL_PATH}}">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://avenrix.com/{{CANONICAL_PATH}}">
  <meta property="og:title" content="{{META_TITLE}} | AVENRIX TECHNOLOGIES">
  <meta property="og:description" content="{{META_DESCRIPTION}}">
  <meta property="og:image" content="https://avenrix.com/assets/img/og-image.jpg">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://avenrix.com/{{CANONICAL_PATH}}">
  <meta property="twitter:title" content="{{META_TITLE}} | AVENRIX TECHNOLOGIES">
  <meta property="twitter:description" content="{{META_DESCRIPTION}}">
  <meta property="twitter:image" content="https://avenrix.com/assets/img/og-image.jpg">

  <!-- Preconnect Google Fonts for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <!-- Core Design CSS -->
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/style.css">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/img/logo.png">

  <!-- JSON-LD Structured Data Schema -->
  <script type="application/ld+json">
    {{STRUCTURED_DATA}}
  </script>
</head>
<body>

  <!-- Shared Header Navbar -->
  {{HEADER}}

  <!-- Main Dynamic Body Page Content -->
  <main id="content">
    {{CONTENT}}
  </main>

  <!-- Shared Footer -->
  {{FOOTER}}

  <!-- Core JavaScript (Loaded dynamically and deferred to ensure high Lighthouse scores) -->
  <script src="assets/js/main.js" defer></script>
</body>
</html>
